// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ===== components/AnswerCard.jsx =====
// AnswerCard — structured answer with confidence badge, summary, warning, steps, sources

function ConfidenceBadge({ level, label }) {
  const cls =
    level === "BELEGT" ? "is-belegt" :
    level === "TEILWEISE" ? "is-teilweise" : "is-nicht";
  return (
    <span className={"lh-answer__badge " + cls}>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: "currentColor" }} />
      {level}
    </span>
  );
}

function StepList({ steps }) {
  return (
    <div className="lh-steps">
      {steps.map((s, i) => (
        <div key={i} className="lh-step">
          <div className="lh-step__num">{i + 1}</div>
          <div className="lh-step__body">
            <div className="lh-step__title">{s.title}</div>
            <div className="lh-step__text">{s.text}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function Alert({ type = "warning", title, text }) {
  const iconName = type === "error" ? "alert" : type === "info" ? "doc" : "alert";
  return (
    <div className={"lh-alert is-" + type}>
      <Icon name={iconName} size={20} />
      <div>
        <div className="lh-alert__title">{title}</div>
        <div className="lh-alert__text">{text}</div>
      </div>
    </div>
  );
}

function SourceCard({ src }) {
  return (
    <a className="lh-source" href="#" onClick={(e) => e.preventDefault()}>
      {src.match && <span className="lh-source__match">{src.match}</span>}
      <div className="lh-source__crumb">{src.breadcrumb}</div>
      <div className="lh-source__title">{src.title}</div>
      <div className="lh-source__file">
        <Icon name="doc" size={12} /> {src.file}
      </div>
    </a>
  );
}

function AnswerCard({ answer, onSpeak, onOpenManual, onAskFollowup }) {
  const lowConf = answer.confidence === "NICHT_BELEGT";
  return (
    <div className="lh-answer">
      <div className="lh-answer__header">
        <ConfidenceBadge level={answer.confidence} />
        <div className="lh-answer__title">
          <strong>{answer.breadcrumb[answer.breadcrumb.length - 1]}</strong>
          <span style={{ color: "var(--fg-tertiary)", marginLeft: 8 }}>· {answer.coverageNote}</span>
        </div>
      </div>

      <div className="lh-answer__body">
        {lowConf && (
          <div className="lh-disclaimer" style={{ marginBottom: 16 }}>
            <div className="lh-disclaimer__icon"><Icon name="alert" size={16} /></div>
            <div>
              <div className="lh-disclaimer__title">Antwort konnte nicht eindeutig belegt werden</div>
              <div className="lh-disclaimer__text">
                Bitte direkt im Manual nachschlagen oder Service kontaktieren. Die unten verlinkte Quelle ist die nächstbeste Übereinstimmung.
              </div>
            </div>
          </div>
        )}

        <div className="lh-answer__summary">{answer.summary}</div>

        {answer.warning && (
          <Alert type={answer.warning.type} title={answer.warning.title} text={answer.warning.text} />
        )}

        {answer.steps && answer.steps.length > 0 && (
          <>
            <div className="lh-answer__section-label">Arbeitsschritte ({answer.steps.length})</div>
            <StepList steps={answer.steps} />
          </>
        )}

        {answer.sources && answer.sources.length > 0 && (
          <>
            <div className="lh-answer__section-label">Quellen im Manual</div>
            <div className="lh-sources">
              {answer.sources.map((s, i) => <SourceCard key={i} src={s} />)}
            </div>
          </>
        )}

        {answer.relatedQuestions && answer.relatedQuestions.length > 0 && (
          <>
            <div className="lh-answer__section-label">Folgefragen</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {answer.relatedQuestions.map((q, i) => (
                <button key={i} className="lh-pill" onClick={() => onAskFollowup && onAskFollowup(q)}>
                  {q}
                </button>
              ))}
            </div>
          </>
        )}
      </div>

      <div className="lh-answer__footer">
        <button className="lh-btn lh-btn--primary" onClick={onOpenManual}>
          <Icon name="external" size={16} />
          Im Manual öffnen
        </button>
        <button className="lh-btn lh-btn--ghost" onClick={onSpeak}>
          <Icon name="speaker" size={16} />
          Vorlesen
        </button>
        <div className="spacer" />
        <button className="lh-btn lh-btn--icon lh-btn--ghost" aria-label="Hilfreich">
          <Icon name="thumbsup" size={16} />
        </button>
        <button className="lh-btn lh-btn--icon lh-btn--ghost" aria-label="Nicht hilfreich">
          <Icon name="thumbsdown" size={16} />
        </button>
        <button className="lh-btn lh-btn--icon lh-btn--ghost" aria-label="Kopieren">
          <Icon name="copy" size={16} />
        </button>
        <button className="lh-btn lh-btn--icon lh-btn--ghost" aria-label="Teilen">
          <Icon name="share" size={16} />
        </button>
      </div>
    </div>
  );
}

function Composer({ onSubmit, onStartVoice, value, onChange }) {
  const [mode, setMode] = React.useState("ask");
  const taRef = React.useRef(null);

  React.useEffect(() => {
    const ta = taRef.current;
    if (!ta) return;
    ta.style.height = "auto";
    ta.style.height = Math.min(160, ta.scrollHeight) + "px";
  }, [value]);

  const handleKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (value.trim()) onSubmit(value);
    }
  };

  return (
    <>
      <div className="lh-composer">
        <textarea
          ref={taRef}
          className="lh-composer__textarea"
          placeholder={
            mode === "ask"
              ? "Frage zur Maschine stellen…  z. B. „Welche Schritte beim Aufrüsten mit 60 m?\""
              : "Fehlercode eingeben…  z. B. E1042"
          }
          value={value}
          onChange={(e) => onChange(e.target.value)}
          onKeyDown={handleKey}
          rows={1}
        />
        <div className="lh-composer__bar">
          <div className="lh-composer__mode">
            <button className={mode === "ask" ? "is-active" : ""} onClick={() => setMode("ask")}>
              <Icon name="chat" size={14} /> Frage
            </button>
            <button className={mode === "ec" ? "is-active" : ""} onClick={() => setMode("ec")}>
              <Icon name="bug" size={14} /> Fehlercode
            </button>
          </div>
          <div className="spacer" />
          <button className="lh-mic-btn" onClick={onStartVoice} aria-label="Sprachaufnahme starten">
            <Icon name="mic" size={20} />
          </button>
          <button
            className="lh-btn lh-btn--primary"
            onClick={() => value.trim() && onSubmit(value)}
            disabled={!value.trim()}
          >
            <Icon name="send" size={16} />
            Senden
          </button>
        </div>
      </div>
      <div className="lh-composer__hint">
        <kbd>↵</kbd> Senden · <kbd>Shift</kbd>+<kbd>↵</kbd> Zeilenumbruch · <kbd>Strg</kbd>+<kbd>M</kbd> Sprache
      </div>
    </>
  );
}

function VoiceOverlay({ active, onCancel, transcript }) {
  if (!active) return null;
  return (
    <div className="lh-voice-overlay">
      <div className="lh-waveform" aria-hidden>
        {Array.from({ length: 14 }).map((_, i) => (
          <span key={i} style={{ animationDelay: (i * 0.07) + "s" }} />
        ))}
      </div>
      <div className="lh-voice-overlay__title">Hört zu…</div>
      <div className="lh-voice-overlay__caption">
        {transcript ? <span className="live">{transcript}</span> : "Sprechen Sie Ihre Frage. Tippen Sie zum Beenden auf Abbrechen."}
      </div>
      <button className="lh-voice-overlay__cancel" onClick={onCancel}>Abbrechen</button>
    </div>
  );
}

              {m.serial === currentSerial && <div className="lh-mc__corner" />}

                <span className="lh-mc__img-label">{m.series.replace(/\s/g, "_")}.png</span>
              </div>
              <div className="lh-mc__body">
                <div className="lh-mc__cat">{m.cat}</div>
                <div className="lh-mc__name">{m.series}</div>
                <div className="lh-mc__meta">SN ···{m.serial.slice(-6)} · {m.spec}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

window.MachineSelect = MachineSelect;

// Error code lookup screen

function ErrorCodeView({ codes, onAskAssistant }) {
  const [query, setQuery] = React.useState("");
  const [active, setActive] = React.useState(null);

  const recents = ["E1042", "E2117", "E0815"];

  const lookup = (q) => {
    const code = q.toUpperCase().trim();
    setQuery(code);
    if (codes[code]) setActive(codes[code]);
    else setActive(null);
  };

  return (
    <div className="lh-chat" style={{ paddingBottom: 64 }}>
      <div className="lh-ec-grid">
        <div>
          <div className="lh-hero__eyebrow">Fehlercode-Lookup</div>
          <h2 className="h3" style={{ marginTop: 4, marginBottom: 8 }}>Fehlercode nachschlagen</h2>
          <p className="copy" style={{ color: "var(--fg-secondary)", marginBottom: 16 }}>
            Geben Sie den Fehlercode aus dem Display ein. Der Assistent liefert Ursache und Handlungsempfehlung
            aus der Fehlercode-Datenbank dieser Maschine.
          </p>
        </div>

        <div className="lh-ec-input-row">
          <input
            placeholder="z. B. E1042"
            value={query}
            onChange={(e) => setQuery(e.target.value.toUpperCase())}
            onKeyDown={(e) => { if (e.key === "Enter") lookup(query); }}
          />
          <button className="lh-mic-btn" aria-label="Sprache"><Icon name="mic" size={18} /></button>
          <button className="lh-btn lh-btn--primary" onClick={() => lookup(query)}>
            <Icon name="search" size={16} /> Suchen
          </button>
        </div>

        <div>
          <div className="copy-xs" style={{ color: "var(--fg-tertiary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.08em" }}>
            Kürzliche Codes
          </div>
          <div className="lh-ec-recents">
            {recents.map(c => (
              <button key={c} className="lh-pill" onClick={() => lookup(c)}>
                <Icon name="bug" size={12} /> {c}
              </button>
            ))}
          </div>
        </div>

        {active && (
          <div className="lh-ec-result" style={{ marginTop: 16 }}>
            <div className="lh-ec-result__top">
              <div className="lh-ec-result__code">{active.code}</div>
              <div className="lh-ec-result__title">{active.title}</div>
              <div className={"lh-ec-result__severity is-" + active.severity}>{active.severityLabel}</div>
            </div>
            <div className="lh-ec-grid-cols">
              <div className="lh-ec-cell">
                <div className="lh-ec-cell__label">Mögliche Ursache</div>
                <div className="lh-ec-cell__text">{active.cause}</div>
              </div>
              <div className="lh-ec-cell">
                <div className="lh-ec-cell__label">Handlungsempfehlung</div>
                <div className="lh-ec-cell__text" style={{ whiteSpace: "pre-line" }}>{active.action}</div>
              </div>
            </div>
            <div className="lh-answer__section-label" style={{ padding: "0 24px", margin: "16px 0 8px" }}>
              Quellen im Manual
            </div>
            <div style={{ padding: "0 24px 20px" }}>
              <div className="lh-sources">
                {active.sources.map((s, i) => <SourceCard key={i} src={s} />)}
              </div>
            </div>
            <div className="lh-answer__footer">
              <button className="lh-btn lh-btn--primary">
                <Icon name="external" size={16} /> Im Manual öffnen
              </button>
              <button className="lh-btn lh-btn--ghost" onClick={() => onAskAssistant(active.code)}>
                <Icon name="chat" size={16} /> Im Assistent fragen
              </button>
              <div className="spacer" />
              <button className="lh-btn lh-btn--ghost lh-btn--small">
                <Icon name="speaker" size={14} /> Vorlesen
              </button>
            </div>
          </div>
        )}

        {query && !active && (
          <div className="lh-disclaimer" style={{ marginTop: 16 }}>
            <div className="lh-disclaimer__icon"><Icon name="alert" size={16} /></div>
            <div>
              <div className="lh-disclaimer__title">Code „{query}\" nicht gefunden</div>
              <div className="lh-disclaimer__text">
                Der Code ist nicht in der Datenbank dieser Maschine. Prüfen Sie die Schreibweise oder
                stellen Sie eine Frage im Assistent.
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

window.ErrorCodeView = ErrorCodeView;


// ===== app.jsx =====
// Main App — wires everything together

const { useState, useEffect, useRef, useCallback } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "comfortable",
  "showVoice": true,
  "accentMode": "yellow"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView] = useState("chat"); // chat | errorcode | select | manual | history
  const [machine, setMachine] = useState(window.DEMO_DATA.machine);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [isThinking, setIsThinking] = useState(false);
  const [voiceActive, setVoiceActive] = useState(false);
  const [voiceTranscript, setVoiceTranscript] = useState("");

  // Apply theme + density to root
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", tweaks.theme);
    document.documentElement.setAttribute("data-density", tweaks.density);
  }, [tweaks.theme, tweaks.density]);

  // Keyboard shortcut: Ctrl+M for voice
  useEffect(() => {
    const onKey = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "m") {
        e.preventDefault();
        startVoice();
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  });

  const chatRef = useRef(null);
  useEffect(() => {
    if (chatRef.current) {
      chatRef.current.scrollTo({ top: chatRef.current.scrollHeight, behavior: "smooth" });
    }
  }, [messages, isThinking]);

  const decideAnswer = (q) => {
    const text = q.toLowerCase();
    if (text.includes("aufrüst") || text.includes("60 m") || text.includes("60m") || text.includes("hauptausl")) {
      return window.DEMO_DATA.answerAufruesten;
    }
    if (/^e\d{3,4}/.test(text.trim())) {
      const code = text.trim().toUpperCase().match(/E\d+/)?.[0];
      if (code && window.DEMO_DATA.errorCodes[code]) {
        const ec = window.DEMO_DATA.errorCodes[code];
        return {
          confidence: "BELEGT",
          confidenceLabel: "Aus Fehlercode-Datenbank",
          coverageNote: `Fehlercode ${ec.code}`,
          breadcrumb: ["Fehlercodes", ec.code],
          summary: `${ec.title}. ${ec.cause}`,
          warning: { type: ec.severity === "error" ? "error" : "warning", title: "MASSNAHME", text: ec.action },
          sources: ec.sources.map(s => ({ ...s, match: "100 %" })),
          relatedQuestions: ["Wann zum Service?", "Kann ich weiterarbeiten?"]
        };
      }
    }
    if (text.includes("?") || text.length > 10) {
      return window.DEMO_DATA.answerLowConfidence;
    }
    return window.DEMO_DATA.answerAufruesten;
  };

  const submitQuestion = (text) => {
    setInput("");
    setMessages(m => [...m, { role: "user", text, time: nowTime() }]);
    setIsThinking(true);
    setTimeout(() => {
      const ans = decideAnswer(text);
      setMessages(m => [...m, { role: "bot", time: nowTime(), answer: ans }]);
      setIsThinking(false);
    }, 1100);
  };

  const startVoice = () => {
    setVoiceActive(true);
    setVoiceTranscript("");
    const phrases = [
      "Welche", "Welche Schritte", "Welche Schritte muss ich",
      "Welche Schritte muss ich beim Aufrüsten",
      "Welche Schritte muss ich beim Aufrüsten mit",
      "Welche Schritte muss ich beim Aufrüsten mit 60 Metern",
      "Welche Schritte muss ich beim Aufrüsten mit 60 Metern befolgen?"
    ];
    let i = 0;
    const t = setInterval(() => {
      if (i >= phrases.length) {
        clearInterval(t);
        setTimeout(() => {
          setVoiceActive(false);
          submitQuestion(phrases[phrases.length - 1]);
        }, 500);
        return;
      }
      setVoiceTranscript(phrases[i]);
      i++;
    }, 350);
  };

  const cancelVoice = () => { setVoiceActive(false); setVoiceTranscript(""); };

  if (view === "select") {
    return (
      <>
        <ThemeFrame tweaks={tweaks} setTweak={setTweak}>
          <Header
            machine={machine}
            onChangeMachine={() => setView("select")}
            onOpenManual={() => setView("manual")}
          />
          <Sidebar
            activeView="select"
            onChangeView={setView}
            history={window.DEMO_DATA.recentHistory}
            onSelectHistory={() => {}}
          />
          <main className="lh-main">
            <MachineSelect
              currentSerial={machine.serial}
              onSelect={(m) => {
                setMachine({
                  ...machine,
                  series: m.series,
                  type: m.cat,
                  serial: m.serial
                });
                setView("chat");
              }}
            />
          </main>
        </ThemeFrame>
      </>
    );
  }

  return (
    <ThemeFrame tweaks={tweaks} setTweak={setTweak}>
      <Header
        machine={machine}
        onChangeMachine={() => setView("select")}
        onOpenManual={() => setView("manual")}
      />
      <Sidebar
        activeView={view}
        onChangeView={setView}
        history={window.DEMO_DATA.recentHistory}
        onSelectHistory={() => {}}
      />
      <main className="lh-main">
        <Breadcrumb view={view} machine={machine} />

        {view === "chat" && (
          <div className="lh-chat" ref={chatRef}>
            <div className="lh-chat__inner">
              {messages.length === 0 && (
                <Hero
                  suggestions={window.DEMO_DATA.suggestions}
                  quickChips={window.DEMO_DATA.quickChips}
                  onPickSuggestion={(s) => {
                    if (s.id === "s2") { setView("errorcode"); return; }
                    submitQuestion(s.title);
                  }}
                  onPickChip={submitQuestion}
                />
              )}
              {messages.map((m, i) => (
                m.role === "user" ? (
                  <div key={i} className="lh-msg is-user">
                    <div className="lh-msg__avatar is-user">MK</div>
                    <div className="lh-msg__body">
                      <div className="lh-msg__role">Mark Köhler<span className="time">{m.time}</span></div>
                      <div className="lh-msg__text">{m.text}</div>
                    </div>
                  </div>
                ) : (
                  <div key={i} className="lh-msg">
                    <div className="lh-msg__avatar is-bot">
                      <Icon name="wrench" size={18} />
                    </div>
                    <div className="lh-msg__body">
                      <div className="lh-msg__role">Maschinen-Assistent<span className="time">{m.time}</span></div>
                      <AnswerCard
                        answer={m.answer}
                        onSpeak={() => speak(m.answer.summary)}
                        onOpenManual={() => setView("manual")}
                        onAskFollowup={submitQuestion}
                      />
                    </div>
                  </div>
                )
              ))}
              {isThinking && (
                <div className="lh-msg">
                  <div className="lh-msg__avatar is-bot"><Icon name="wrench" size={18} /></div>
                  <div className="lh-msg__body">
                    <div className="lh-msg__role">Maschinen-Assistent<span className="time">denkt nach…</span></div>
                    <div style={{ color: "var(--fg-tertiary)", fontSize: 13, marginBottom: 4 }}>
                      Suche im Manual · 5 Treffer · prüfe Belege…
                    </div>
                    <div className="lh-typing"><span /><span /><span /></div>
                  </div>
                </div>
              )}
            </div>

            <div className="lh-composer-wrap">
              <Composer
                value={input}
                onChange={setInput}
                onSubmit={submitQuestion}
                onStartVoice={startVoice}
              />
            </div>
          </div>
        )}

        {view === "errorcode" && (
          <ErrorCodeView
            codes={window.DEMO_DATA.errorCodes}
            onAskAssistant={(code) => { setView("chat"); submitQuestion("Was bedeutet " + code + "?"); }}
          />
        )}

        {view === "history" && <HistoryView />}
        {view === "manual" && <ManualPlaceholder onBack={() => setView("chat")} />}

        <VoiceOverlay active={voiceActive} onCancel={cancelVoice} transcript={voiceTranscript} />
      </main>
    </ThemeFrame>
  );
}

function ThemeFrame({ children, tweaks, setTweak }) {
  return (
    <>
      <div className="app">{children}</div>
      <TweaksPanel title="Tweaks">
        <TweakSection title="Erscheinungsbild">
          <TweakRadio
            label="Theme"
            value={tweaks.theme}
            options={[{ value: "light", label: "Hell" }, { value: "dark", label: "Kabine (dunkel)" }]}
            onChange={(v) => setTweak("theme", v)}
          />
          <TweakRadio
            label="Dichte"
            value={tweaks.density}
            options={[{ value: "comfortable", label: "Komfort" }, { value: "compact", label: "Kompakt" }]}
            onChange={(v) => setTweak("density", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

function Breadcrumb({ view, machine }) {
  const map = {
    chat: ["Assistent", "Chat"],
    errorcode: ["Assistent", "Fehlercodes"],
    history: ["Assistent", "Verlauf"],
    manual: ["Assistent", "Manual"],
  };
  const crumbs = map[view] || ["Assistent"];
  return (
    <nav className="lh-breadcrumb" aria-label="Breadcrumb">
      <a>{machine.series}</a>
      <span className="lh-breadcrumb__sep">›</span>
      {crumbs.map((c, i) => (
        <React.Fragment key={i}>
          {i < crumbs.length - 1 ? <a>{c}</a> : <span className="lh-breadcrumb__current">{c}</span>}
          {i < crumbs.length - 1 && <span className="lh-breadcrumb__sep">›</span>}
        </React.Fragment>
      ))}
      <div style={{ flex: 1 }} />
      <span style={{ fontSize: 12, color: "var(--fg-tertiary)" }}>
        Manual {machine.manualVersion} · letzte Sync {machine.lastSync}
      </span>
    </nav>
  );
}

function HistoryView() {
  return (
    <div className="lh-chat">
      <div className="lh-chat__inner">
        <div className="lh-hero__eyebrow">Verlauf</div>
        <h2 className="h3" style={{ margin: "4px 0 16px" }}>Letzte Anfragen</h2>
        <div style={{ border: "1px solid var(--border)", background: "var(--bg-surface)" }}>
          {window.DEMO_DATA.recentHistory.map((h, i) => (
            <div key={h.id} style={{
              padding: "16px 20px",
              borderBottom: i < window.DEMO_DATA.recentHistory.length - 1 ? "1px solid var(--border)" : "none",
              display: "grid", gridTemplateColumns: "auto 1fr auto auto", gap: 16, alignItems: "center"
            }}>
              <span className={"lh-history-item__dot is-" + h.status} style={{ width: 10, height: 10 }} />
              <div>
                <div style={{ fontFamily: "LiebherrText-Medium", fontSize: 15 }}>{h.title}</div>
                <div style={{ fontSize: 12, color: "var(--fg-tertiary)", marginTop: 2 }}>{h.time}</div>
              </div>
              <span className="lh-pill">
                {h.status === "ok" ? "Beantwortet" : h.status === "warning" ? "Warnung" : "Fehler"}
              </span>
              <button className="lh-btn lh-btn--ghost lh-btn--small">
                <Icon name="external" size={14} /> Öffnen
              </button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ManualPlaceholder({ onBack }) {
  return (
    <div className="lh-chat">
      <div className="lh-chat__inner">
        <div className="lh-hero__eyebrow">Manual</div>
        <h2 className="h3" style={{ margin: "4px 0 8px" }}>Aufrüsten des Hauptauslegers</h2>
        <div style={{ color: "var(--fg-tertiary)", fontSize: 13, marginBottom: 16, fontFamily: "ui-monospace, monospace" }}>
          ID_8a3f12-de-DE.html · DE 04/2025
        </div>
        <div style={{
          aspectRatio: "16 / 11",
          background: "repeating-linear-gradient(135deg, var(--bg-elevated) 0 16px, var(--bg-chip) 16px 32px)",
          border: "1px solid var(--border)",
          display: "flex", alignItems: "center", justifyContent: "center",
          color: "var(--fg-tertiary)", fontFamily: "ui-monospace, monospace", fontSize: 13
        }}>
          [ Manual HTML-Seite würde hier eingebettet ]
        </div>
        <div style={{ marginTop: 16, display: "flex", gap: 8 }}>
          <button className="lh-btn lh-btn--secondary" onClick={onBack}>← Zurück zum Assistent</button>
          <button className="lh-btn lh-btn--ghost"><Icon name="external" size={14} /> In neuem Tab öffnen</button>
        </div>
      </div>
    </div>
  );
}

function speak(text) {
  if (!window.speechSynthesis) return;
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "de-DE";
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch {}
}

function nowTime() {
  const d = new Date();
  return `${d.getHours().toString().padStart(2, "0")}:${d.getMinutes().toString().padStart(2, "0")}`;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
